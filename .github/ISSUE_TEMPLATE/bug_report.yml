name: Bug report
description: Report a reproducible problem or regression in MarketPlaceLens.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue without private marketplace data.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and the actual behavior.
      placeholder: Listings marked as seen still appear in the active listing browser.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
      placeholder: Seen listings should disappear from the active list unless I filter for seen items.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps if possible.
      placeholder: |
        1. Open Listings
        2. Mark one listing as Seen
        3. Refresh the active list
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share the most relevant environment details.
      placeholder: |
        - MarketPlaceLens version: 0.2.0
        - Deployment: Docker / Docker Compose / local uvicorn
        - Host OS: Debian 13
        - Browser: Firefox 145
        - Source: Kleinanzeigen / Facebook Marketplace / mobile.de / generic HTML
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or additional context
      description: Paste logs or add screenshots if they help. Remove tokens, private URLs, and personal data.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I am using a current MarketPlaceLens version or verified the problem on a recent build.
          required: false
        - label: I searched existing issues and did not find an identical report.
          required: false
