# This file is used to build the infrastructure for a deployment.
# After editing something here, apply the changes on the Diploi dashboard.
# For more information, see https://diploi.com/yaml

diploiVersion: v1.0
components:
  - hosts:
      - port: 8080
        endpoint: true
        name: MarketPlaceLens
        identifier: app
    name: FastAPI
    identifier: fastapi
    folder: /
    package: https://github.com/diploi/component-fastapi#v0.136.1
    containerCommands:
      productionStart: >-
        uv run --with uvicorn uvicorn app.main:app --host 0.0.0.0 --port 8080
        --proxy-headers
      developmentStart: >-
        uv run --with uvicorn uvicorn app.main:app --host 0.0.0.0 --port 8080
        --reload --reload-dir app
    env:
      include:
        - value: '3.12'
          name: PYTHON_VERSION
        - value: /app/data/marketplacelens.db
          name: MARKETPLACELENS_DB_PATH
        - value: 'true'
          name: MARKETPLACELENS_POLL_ENABLED
        - value: '30'
          name: MARKETPLACELENS_MIN_POLL_MINUTES
        - value: '60'
          name: MARKETPLACELENS_DEFAULT_POLL_MINUTES
        - value: admin
          name: MARKETPLACELENS_ADMIN_USERNAME
        - value: /app/data/session.secret
          name: MARKETPLACELENS_SESSION_SECRET_FILE
addons: []
