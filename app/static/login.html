<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MarketPlaceLens Login</title>
    <link rel="icon" href="/static/favicon.ico" sizes="any">
    <link rel="icon" href="/static/assets/marketplacelens-logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/assets/marketplacelens-icon-180.png">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand">
          <img class="brand-logo" src="/static/assets/marketplacelens-logo.svg" alt="" width="42" height="42">
          <div>
            <strong>MarketPlaceLens</strong>
          <small data-i18n="brand.subtitle">self-hosted listing watcher</small>
          </div>
        </div>
        <select id="language-select" class="language-select login-language" aria-label="Language">
          <option value="en">English</option>
          <option value="de">Deutsch</option>
        </select>
        <select id="theme-select" class="language-select login-language" aria-label="Theme">
          <option value="light" data-i18n="theme.light">Light</option>
          <option value="dark" data-i18n="theme.dark">Dark</option>
        </select>
        <form id="login-form" class="form-grid">
          <label class="wide"><span data-i18n="login.username">Username</span><input id="username" autocomplete="username"></label>
          <label class="wide"><span data-i18n="login.password">Password</span><input id="password" type="password" autocomplete="current-password"></label>
          <button class="button primary wide" type="submit" data-i18n="login.signIn">Sign in</button>
          <p id="login-error" class="danger-text wide"></p>
        </form>
      </section>
    </main>
    <script>
      const translations = {
        en: {
          "brand.subtitle": "self-hosted listing watcher",
          "login.username": "Username",
          "login.password": "Password",
          "login.signIn": "Sign in",
          "login.failed": "Login failed",
          "theme.light": "Light",
          "theme.dark": "Dark",
        },
        de: {
          "brand.subtitle": "selbst gehosteter Anzeigen-Watcher",
          "login.username": "Benutzername",
          "login.password": "Passwort",
          "login.signIn": "Anmelden",
          "login.failed": "Login fehlgeschlagen",
          "theme.light": "Hell",
          "theme.dark": "Dunkel",
        },
      };
      let language = localStorage.getItem("marketplacelens.language") || "en";
      let theme = localStorage.getItem("marketplacelens.theme") || "light";
      const languageSelect = document.querySelector("#language-select");
      const themeSelect = document.querySelector("#theme-select");
      languageSelect.value = language;
      themeSelect.value = theme;
      function t(key) {
        return translations[language]?.[key] || translations.en[key] || key;
      }
      function applyTranslations() {
        document.documentElement.lang = language;
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
      }
      function applyTheme() {
        document.body.dataset.theme = theme === "dark" ? "dark" : "light";
        document.documentElement.style.colorScheme = theme === "dark" ? "dark" : "light";
      }
      languageSelect.addEventListener("change", () => {
        language = languageSelect.value === "de" ? "de" : "en";
        localStorage.setItem("marketplacelens.language", language);
        applyTranslations();
      });
      themeSelect.addEventListener("change", () => {
        theme = themeSelect.value === "dark" ? "dark" : "light";
        localStorage.setItem("marketplacelens.theme", theme);
        applyTheme();
      });
      applyTheme();
      applyTranslations();
      document.querySelector("#login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.querySelector("#login-error");
        error.textContent = "";
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.querySelector("#username").value,
            password: document.querySelector("#password").value,
          }),
        });
        if (!response.ok) {
          error.textContent = t("login.failed");
          return;
        }
        window.location.href = "/";
      });
    </script>
  </body>
</html>
