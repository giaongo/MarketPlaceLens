<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MarketPlaceLens</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <strong>MarketPlaceLens</strong>
          <small>self-hosted listing watcher</small>
        </div>
      </div>
      <nav>
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="profiles">Search profiles</button>
        <button class="nav-item" data-view="listings">Listings</button>
        <button class="nav-item" data-view="settings">Settings</button>
      </nav>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">Local marketplace watcher</p>
          <h1 id="view-title">Dashboard</h1>
        </div>
        <button id="refresh-button" class="button ghost">Refresh</button>
      </header>

      <section id="dashboard-view" class="view active">
        <div class="status-grid">
          <article>
            <span>Active profiles</span>
            <strong id="summary-active">0</strong>
          </article>
          <article>
            <span>New listings</span>
            <strong id="summary-new">0</strong>
          </article>
          <article>
            <span>Hidden</span>
            <strong id="summary-hidden">0</strong>
          </article>
          <article>
            <span>Notified</span>
            <strong id="summary-notified">0</strong>
          </article>
        </div>
        <section class="panel">
          <div class="panel-heading">
            <h2>Recent runs</h2>
          </div>
          <div id="recent-runs" class="simple-list"></div>
        </section>
      </section>

      <section id="profiles-view" class="view">
        <div class="two-column">
          <section class="panel">
            <div class="panel-heading">
              <h2>Search profiles</h2>
              <button id="new-profile-button" class="button">New profile</button>
            </div>
            <div id="profiles-list" class="profile-list"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2 id="profile-form-title">New profile</h2>
            </div>
            <form id="profile-form" class="form-grid">
              <input type="hidden" id="profile-id">
              <label>Name<input id="profile-name" required placeholder="Free electronics nearby"></label>
              <label>Source
                <select id="profile-source">
                  <option value="html">Generic HTML listing page</option>
                  <option value="kleinanzeigen">Kleinanzeigen search URL</option>
                </select>
              </label>
              <label class="wide">Search URL<input id="profile-url" type="url" required placeholder="https://www.kleinanzeigen.de/..."></label>
              <label>Poll interval minutes<input id="profile-interval" type="number" min="30" value="60"></label>
              <label>Location hint<input id="profile-location" placeholder="Berlin, 25 km"></label>
              <label>Min price<input id="profile-min-price" type="number" step="0.01"></label>
              <label>Max price<input id="profile-max-price" type="number" step="0.01"></label>
              <label class="wide">Include keywords<textarea id="profile-include" placeholder="electronics&#10;defect"></textarea></label>
              <label class="wide">Required keywords<textarea id="profile-required" placeholder="pickup"></textarea></label>
              <label class="wide">Exclude keywords<textarea id="profile-exclude" placeholder="washing machine&#10;dryer"></textarea></label>
              <label class="wide">Excluded categories<textarea id="profile-categories" placeholder="household appliances"></textarea></label>
              <label class="switch"><input id="profile-enabled" type="checkbox" checked> Enabled</label>
              <label class="switch"><input id="profile-notify" type="checkbox" checked> Telegram notifications</label>
              <div class="actions wide">
                <button class="button primary" type="submit">Save profile</button>
                <button class="button ghost" type="button" id="run-profile-button">Run now</button>
                <button class="button danger" type="button" id="delete-profile-button">Delete</button>
              </div>
            </form>
          </section>
        </div>
      </section>

      <section id="listings-view" class="view">
        <section class="panel">
          <div class="panel-heading">
            <h2>Listing history</h2>
            <div class="filters">
              <select id="listing-status-filter">
                <option value="">All statuses</option>
                <option value="new">New</option>
                <option value="notified">Notified</option>
                <option value="hidden">Hidden</option>
                <option value="seen">Seen</option>
              </select>
              <label class="switch compact"><input id="include-hidden" type="checkbox" checked> Hidden</label>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Profile</th>
                  <th>Price</th>
                  <th>Location</th>
                  <th>Status</th>
                  <th>Score</th>
                  <th>Reason</th>
                  <th>Seen</th>
                </tr>
              </thead>
              <tbody id="listings-table"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section id="settings-view" class="view">
        <section class="panel narrow">
          <div class="panel-heading">
            <h2>Telegram</h2>
          </div>
          <form id="settings-form" class="form-grid">
            <label class="wide">Bot token<input id="telegram-token" type="password" autocomplete="off" placeholder="123456:ABC..."></label>
            <label class="wide">Chat ID<input id="telegram-chat" placeholder="123456789"></label>
            <label>Global rate limit seconds<input id="global-rate" type="number" min="5" value="20"></label>
            <div class="actions wide">
              <button class="button primary" type="submit">Save settings</button>
              <button class="button ghost" id="telegram-test-button" type="button">Send test</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <div id="toast" role="status"></div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
