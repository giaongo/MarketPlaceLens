services:
  marketplacelens:
    image: alexrosbach/marketplacelens:dev
    build:
      context: .
      args:
        MARKETPLACELENS_BUILD_CODE: ${MARKETPLACELENS_BUILD_CODE:-20260614.2}
        MARKETPLACELENS_BUILD_COMMIT: ${MARKETPLACELENS_BUILD_COMMIT:-dev}
        MARKETPLACELENS_BUILD_BRANCH: ${MARKETPLACELENS_BUILD_BRANCH:-main}
        MARKETPLACELENS_BUILD_CREATED: ${MARKETPLACELENS_BUILD_CREATED:-}
    container_name: marketplacelens
    restart: unless-stopped
    environment:
      MARKETPLACELENS_DB_PATH: /data/marketplacelens.db
      MARKETPLACELENS_POLL_ENABLED: ${MARKETPLACELENS_POLL_ENABLED:-true}
      MARKETPLACELENS_MIN_POLL_MINUTES: ${MARKETPLACELENS_MIN_POLL_MINUTES:-30}
      MARKETPLACELENS_DEFAULT_POLL_MINUTES: ${MARKETPLACELENS_DEFAULT_POLL_MINUTES:-60}
      MARKETPLACELENS_USER_AGENT: ${MARKETPLACELENS_USER_AGENT:-MarketPlaceLens/0.3 (+self-hosted listing watcher)}
      MARKETPLACELENS_ADMIN_USERNAME: ${MARKETPLACELENS_ADMIN_USERNAME:-admin}
      MARKETPLACELENS_WEBHOOK_URL: ${MARKETPLACELENS_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "8091:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - marketplacelens_data:/data

volumes:
  marketplacelens_data:
